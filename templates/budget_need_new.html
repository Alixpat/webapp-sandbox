{% extends "base.html" %}
{% block title %}Nouvelle expression de besoin - Budget Manager{% endblock %}
{% block content %}
<div class="fr-grid-row fr-grid-row--center">
    <div class="fr-col-12 fr-col-md-8 fr-col-lg-6">
        <h1 class="fr-h3 fr-mb-1v">Nouvelle expression de besoin budgétaire</h1>
        <p class="fr-text--sm fr-text--alt fr-mb-3w">Projet : <strong>{{ project.name }}</strong></p>
        <form method="POST" enctype="multipart/form-data">
            <div class="fr-input-group">
                <label class="fr-label" for="label">Libellé</label>
                <input class="fr-input" type="text" id="label" name="label" required placeholder="Ex: Licence logicielle">
            </div>
            <div class="fr-grid-row fr-grid-row--gutters">
                <div class="fr-col-12 fr-col-md-6">
                    <div class="fr-input-group">
                        <label class="fr-label" for="amount_mco">
                            Montant MCO (&euro;)
                            <span class="fr-hint-text">Maintien en condition opérationnelle</span>
                        </label>
                        <input class="fr-input" type="number" id="amount_mco" name="amount_mco" step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>
                <div class="fr-col-12 fr-col-md-6">
                    <div class="fr-input-group">
                        <label class="fr-label" for="amount_investment">
                            Montant Investissement (&euro;)
                            <span class="fr-hint-text">Dépenses d'investissement</span>
                        </label>
                        <input class="fr-input" type="number" id="amount_investment" name="amount_investment" step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>
            </div>
            <div class="fr-input-group">
                <label class="fr-label" for="justification">Justification</label>
                <textarea class="fr-input" id="justification" name="justification" rows="4" placeholder="Expliquez pourquoi cette dépense est nécessaire..."></textarea>
            </div>
            <div class="fr-upload-group">
                <label class="fr-label" for="attachments">
                    Pièces jointes
                    <span class="fr-hint-text">Vous pouvez sélectionner plusieurs fichiers (max 16 Mo au total).</span>
                </label>
                <input class="fr-upload" type="file" id="attachments" name="attachments" multiple>
            </div>
            <div class="fr-btns-group fr-btns-group--inline fr-mt-3w">
                <button type="submit" class="fr-btn">Ajouter</button>
                <a href="{{ url_for('project_detail', project_id=project.id) }}" class="fr-btn fr-btn--secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
