{% extends "base.html" %}
{% block title %}Nouveau projet - Budget Manager{% endblock %}
{% block content %}
<div style="max-width: 600px;">
    <h1 style="margin-bottom: 1.5rem;">Nouveau projet</h1>
    <div class="card" style="padding: 1.5rem;">
        <form method="POST">
            <div class="form-group">
                <label for="name">Nom du projet</label>
                <input type="text" id="name" name="name" required placeholder="Ex: Refonte du site web">
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Décrivez brièvement le projet..."></textarea>
            </div>
            <div style="display: flex; gap: 0.8rem;">
                <button type="submit" class="btn btn-success">Créer le projet</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
