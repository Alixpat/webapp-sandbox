{% extends "base.html" %}
{% block title %}Nouveau projet - Budget Manager{% endblock %}
{% block content %}
<div class="fr-grid-row fr-grid-row--center">
    <div class="fr-col-12 fr-col-md-8 fr-col-lg-6">
        <h1 class="fr-h3 fr-mb-3w">Nouveau projet</h1>
        <form method="POST">
            <div class="fr-input-group">
                <label class="fr-label" for="name">Nom du projet</label>
                <input class="fr-input" type="text" id="name" name="name" required placeholder="Ex: Refonte du site web">
            </div>
            <div class="fr-input-group">
                <label class="fr-label" for="description">Description</label>
                <textarea class="fr-input" id="description" name="description" rows="4" placeholder="Décrivez brièvement le projet..."></textarea>
            </div>
            <div class="fr-btns-group fr-btns-group--inline">
                <button type="submit" class="fr-btn">Créer le projet</button>
                <a href="{{ url_for('dashboard') }}" class="fr-btn fr-btn--secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
