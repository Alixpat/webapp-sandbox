{% extends "base.html" %}
{% block title %}Nouvelle ligne budgétaire - Budget Manager{% endblock %}
{% block content %}
<div style="max-width: 600px;">
    <h1 style="margin-bottom: 0.3rem;">Nouvelle ligne budgétaire</h1>
    <p class="meta" style="margin-bottom: 1.5rem;">Projet : <strong>{{ project.name }}</strong></p>
    <div class="card" style="padding: 1.5rem;">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="label">Libellé</label>
                <input type="text" id="label" name="label" required placeholder="Ex: Licence logicielle">
            </div>
            <div class="form-group">
                <label for="amount">Montant (&euro;)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="justification">Justification</label>
                <textarea id="justification" name="justification" placeholder="Expliquez pourquoi cette dépense est nécessaire..."></textarea>
            </div>
            <div class="form-group">
                <label for="attachments">Pièces jointes</label>
                <input type="file" id="attachments" name="attachments" multiple style="padding: 0.4rem;">
                <p style="font-size: 0.8rem; color: #888; margin-top: 0.3rem;">Vous pouvez sélectionner plusieurs fichiers (max 16 Mo au total).</p>
            </div>
            <div style="display: flex; gap: 0.8rem;">
                <button type="submit" class="btn btn-success">Ajouter</button>
                <a href="{{ url_for('project_detail', project_id=project.id) }}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
