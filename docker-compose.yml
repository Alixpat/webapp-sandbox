services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hello
      POSTGRES_PASSWORD: hello
      POSTGRES_DB: hellodb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hellodb"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "10000:10000"
    environment:
      DATABASE_URL: postgresql://hello:hello@db:5432/hellodb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
